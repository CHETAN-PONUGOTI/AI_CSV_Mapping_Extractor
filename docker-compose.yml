services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - sqlite_data:/app/data 
    env_file:
      - ./backend/.env 
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - GEMINI_API_KEY=${GEMINI_API_KEY} 
      - PORT=8080
      -
      - MAX_UPLOAD_SIZE_MB=50

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend

volumes:
  sqlite_data:
